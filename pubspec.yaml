name: progetto_finale
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.6.1

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_markdown: ^0.7.4+1
  http: ^1.6.0
  flutter_svg: ^2.0.17
  shared_preferences: ^2.3.0
  media_kit: ^1.1.0
  media_kit_video: ^1.2.0
  media_kit_libs_windows_video: ^1.0.0
  page_flip: ^0.2.5+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  msix: ^3.16.13

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/image/
    - assets/video/
    - assets/backgrounds/
    - assets/icons/
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

# =============================================================================
# MSIX — Configurazione pacchetto Windows (sideloading / distribuzione diretta)
# =============================================================================
#
# PREREQUISITO: eseguire la build release prima di creare l'MSIX
#   flutter build windows --release
#
# GENERARE L'MSIX:
#   dart run msix:create
#
# OUTPUT:
#   build\windows\x64\runner\Release\apprenderai.msix
#
# INSTALLAZIONE SU PC DESTINATARIO:
#   1. Abilitare "Sideloading": Impostazioni → Sistema → Per sviluppatori →
#      "Installa app da qualsiasi origine"
#   2. Doppio clic sul file .msix → segui il wizard
#   3. Se certificato non trusted: installare prima il .cer (nella stessa
#      cartella dell'msix) in "Autorità di certificazione radice attendibili"
# =============================================================================

msix_config:

  # ── Identità pacchetto ──────────────────────────────────────────────────────
  # Deve essere unico e in formato DNS inverso. Non modificare dopo la prima
  # distribuzione (cambierà l'identità del pacchetto installato).
  identity_name: com.inforelea.apprenderai

  # Nome visualizzato nell'installer, nel menu Start e in Programmi installati
  display_name: ApprenderAI

  # Publisher visibile all'utente (non deve corrispondere al CN del certificato)
  publisher_display_name: Andrea Conrado

  # Subject del certificato di firma — deve corrispondere ESATTAMENTE al CN
  # del certificato .pfx usato per firmare.
  # Se si usa la firma automatica con certificato self-signed (default msix),
  # lasciare uguale a publisher_display_name.
  publisher: CN=Andrea Conrado

  # ── Versione ─────────────────────────────────────────────────────────────────
  # Formato MSIX: Major.Minor.Build.Revision (4 parti, tutte obbligatorie)
  msix_version: 1.0.0.0

  # ── Icona e logo ─────────────────────────────────────────────────────────────
  # Il package msix ridimensiona automaticamente il logo nei formati richiesti
  # (44x44, 150x150, 310x150, ecc.). Usare un'immagine PNG ad alta risoluzione.
  logo_path: assets\image\logo.png

  # ── Capabilities (permessi dichiarati nel manifest) ──────────────────────────
  # internetClient: necessario per le chiamate HTTP al backend Flask e a n8n/QuickChart
  capabilities: internetClient

  # ── Output ───────────────────────────────────────────────────────────────────
  output_path: installer_output
  output_name: ApprenderAI_1.0.0

  # ── Firma certificato ────────────────────────────────────────────────────────
  # OPZIONE A — Certificato self-signed generato automaticamente dal tool msix
  # (default quando certificate_path è assente). Richiede che il destinatario
  # installi il .cer come radice attendibile.
  #
  # OPZIONE B — Certificato .pfx esistente (commentare/decommentare):
  # certificate_path: certificates\apprenderai.pfx
  # certificate_password: TuaPasswordCertificato

  certificate_path: certificates\apprenderai.pfx

  # Installa automaticamente il certificato self-signed durante il processo
  # di creazione (richiede PowerShell con privilegi admin sulla macchina di build)
  install_certificate: false

  # ── Metadati aggiuntivi ──────────────────────────────────────────────────────
  description: Piattaforma di studio AI-powered per scuole medie, superiori e università
  languages: it-IT, en-US
